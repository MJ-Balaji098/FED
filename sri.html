<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaaroz Food Delivery</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f5f5f5;
            color: #222;
        }

        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            padding: 16px 8%;
            background-color: #202020;
            color: white;
        }

        .logo {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
        }

        .nav-links {
            display: flex;
            gap: 16px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 10px;
            border-radius: 6px;
        }

        .nav-links a:hover {
            background-color: #ff6b35;
        }

        .hero {
            min-height: calc(100vh - 64px);
            display: grid;
            place-items: center;
            padding: 40px 8%;
            text-align: center;
        }

        .hero img {
            width: min(100%, 850px);
            height: auto;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
        }

        .hero h1 {
            margin: 24px 0 10px;
            font-size: 36px;
        }

        .hero p {
            max-width: 650px;
            margin: 0 auto;
            font-size: 18px;
            line-height: 1.6;
        }

        @media (max-width: 650px) {
            .navbar {
                flex-direction: column;
                align-items: flex-start;
            }

            .nav-links {
                flex-wrap: wrap;
            }

            .hero h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <p class="logo">Zaaroz</p>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Menu</a>
            <a href="#">Offers</a>
            <a href="#">Contact</a>
        </div>
    </nav>

    <main class="hero">
        <section>
            <img src="zaaroz-overview-1753384473198.webp" alt="Zaaroz food delivery overview">
            <h1>Fresh Food, Fast Delivery</h1>
            <p>Order your favorite meals online and enjoy quick delivery with a simple, clean food ordering experience.</p>
        </section>
    </main>
</body>
</html>
